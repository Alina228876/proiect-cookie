<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>Lab Cookie Alina Gordon</title>

<style>
body {
    font-family: Arial;
    margin: 20px;
}

h1 {
    text-align: center;
}

.section {
    margin-bottom: 20px;
    padding-bottom: 10px;
    border-bottom: 1px solid #ccc;
}

input {
    margin: 5px;
}

button {
    margin: 5px;
}

table {
    border-collapse: collapse;
    width: 100%;
    margin-top: 10px;
}

th, td {
    border: 1px solid #ccc;
    padding: 6px;
}
</style>

<script>

// SET cookie cu expirare
function setCookie(name, value, days = 1) {
    let d = new Date();
    d.setTime(d.getTime() + days * 24 * 60 * 60 * 1000);
    document.cookie = `${name}=${value}; expires=${d.toUTCString()}; path=/`;
}

// citire cookie-uri într-un obiect
function getCookies() {
    let cookies = {};
    document.cookie.split(";").forEach(c => {
        let [k, v] = c.trim().split("=");
        if (k) cookies[k] = v;
    });
    return cookies;
}

// afișare în tabel
function renderCookies() {
    let cookies = getCookies();
    let html = "<tr><th>Nume</th><th>Valoare</th><th>Acțiune</th></tr>";

    for (let k in cookies) {
        html += `
        <tr>
            <td>${k}</td>
            <td>${cookies[k]}</td>
            <td><button onclick="deleteCookie('${k}')">Șterge</button></td>
        </tr>`;
    }

    document.getElementById("table").innerHTML = html;
}

// adăugare din input
function addCookie() {
    let name = document.getElementById("name").value;
    let value = document.getElementById("value").value;
    let days = document.getElementById("days").value || 1;

    if (!name) {
        alert("Introdu numele cookie-ului");
        return;
    }

    setCookie(name, value, days);
    renderCookies();
}

// ștergere cookie
function deleteCookie(name) {
    document.cookie = name + "=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
    renderCookies();
}

// afișează cookie brut
function showAll() {
    document.getElementById("out").innerText = document.cookie;
}

window.onload = renderCookies;

</script>

</head>

<body>

<h1>Lab Cookie Alina Gordon</h1>

<div class="section">
<h3>Adaugă cookie</h3>

<input id="name" placeholder="nume">
<input id="value" placeholder="valoare">
<input id="days" type="number" placeholder="zile">

<button onclick="addCookie()">Adaugă</button>
<button onclick="showAll()">Afișează brut</button>

<div id="out"></div>
</div>

<div class="section">
<h3>Cookie-uri existente</h3>
<table id="table"></table>
</div>

</body>
</html>
